<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Westlands Bowls — latest scores & fixtures</title>
  <meta name="description" content="Latest results, next games and league tables for all Westlands bowls teams.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%231f7a3d'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='17' font-weight='bold' fill='white' text-anchor='middle'%3EW%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-head">
    <div class="wrap">
      <h1><span class="dot"></span>Westlands Bowls</h1>
      <p class="tagline">Latest scores, next games &amp; league tables — every Westlands team, one page.</p>
      <div class="statusbar">
        <span id="status" class="status">Loading…</span>
        <button id="refresh" class="btn-refresh" type="button" title="Fetch the very latest from cgleague">↻ Refresh</button>
      </div>
      <div id="nextup" class="nextup" hidden></div>
    </div>
  </header>

  <main id="board" class="wrap" aria-live="polite">
    <p class="loading">Loading the latest scores…</p>
  </main>

  <footer class="site-foot">
    <div class="wrap">
      <p>Scores sourced live from <a href="https://www.cgleague.co.uk/" target="_blank" rel="noopener">cgleague.co.uk</a>. Unofficial fan page — not affiliated with the leagues.</p>
      <p id="foot-updated" class="muted"></p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
