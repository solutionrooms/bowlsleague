<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Westlands Bowls</title>
  <meta name="description" content="Latest results, next games, tables and player rankings for all Westlands bowls teams.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%231f7a3d'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='17' font-weight='bold' fill='white' text-anchor='middle'%3EW%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top">
    <div class="bar">
      <button id="me-btn" class="me-btn" type="button" title="Choose which player is you">👤 It's me</button>
      <h1>Westlands Bowls</h1>
      <button id="refresh" class="upd" type="button">↻ Update</button>
    </div>
    <div class="subbar">
      <div class="tabs">
        <button class="tab on" type="button" data-tab="games">Games</button>
        <button class="tab" type="button" data-tab="rankings">Rankings</button>
      </div>
      <div id="scope" class="scope" hidden>
        <button type="button" data-scope="mine">My games</button>
        <button type="button" data-scope="all">All games</button>
      </div>
    </div>
  </header>

  <main>
    <button id="get-results" class="get-btn" type="button">↻ Get latest results<span id="gr-note" class="gr-note"></span></button>
    <div id="games-view">
      <div id="clubstat" class="clubstat"></div>
      <section id="nextup" class="nextup"></section>
      <div id="board"><p class="loading">Loading…</p></div>
    </div>
    <div id="rankings-view" hidden>
      <div id="rankings"></div>
    </div>
  </main>

  <footer class="foot">
    Live from <a href="https://www.cgleague.co.uk/">cgleague</a> &amp;
    <a href="https://bowlsresults.co.uk/">bowlsresults</a>.
    Unofficial. <span id="upd-time"></span>
  </footer>

  <div id="picker" class="picker" hidden>
    <div class="picker-panel">
      <div class="picker-head">
        <span>Who are you?</span>
        <button id="picker-close" type="button" aria-label="Close">✕</button>
      </div>
      <input id="picker-search" type="search" placeholder="Type your name…" autocomplete="off">
      <div id="picker-list" class="picker-list"></div>
      <button id="picker-clear" class="picker-clear" type="button">Show everyone (clear)</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
