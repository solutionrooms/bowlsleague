name: Build & deploy site

on:
  push:
    branches: [main]
  schedule:
    # Every 30 minutes — keeps the committed snapshot fresh as a fallback.
    # (The page also fetches live from the source sites on every load.)
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scrape leagues and assemble the site
        run: |
          node scripts/scrape.mjs
          mkdir -p _site
          cp index.html styles.css app.js parser.js parser-bowlsresults.js _site/
          # Stamp a cache-busting version into the asset URLs so updates land immediately.
          sed -i "s/?v=DEV/?v=${GITHUB_SHA::7}/g" _site/index.html _site/app.js _site/parser-bowlsresults.js
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
